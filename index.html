<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Ranked Toolbox</title>
        <link rel="stylesheet" href="styles.css">
        <script src="app.js" defer></script>
    </head>
    <body>
        <div id="title">
            <h1>MCSR Ranked Toolbox</h1>
            <div>
                <input type="text" id="playerName" placeholder="Enter player name..." />
                <button id="goButton"
                        onclick="go()"
                        style="
                        background-image: url('spyglass.png');
                        width: 40px;
                        height: 40px;
                        background-size: cover;
                        background-repeat: no-repeat;
                        background-color: rgb(2, 7, 49);
                        border: none;
                        transform: translateY(13px);
                        cursor: pointer;
                        ">
                </button>
            </div>
        </div>
        <div id="toolgrid">
            <div class="tool">
                <h2 class="tooltitle playerstats">Player stats</h2>
                <div id="info">
                    <p id="rank">Elo: </p>
                    <p id="peak">Peak Elo: </p>
                    <p id="pb">PB: </p>
                    <p id="avg">Average: </p>
                    <p id="winrate">Win Rate: </p>
                    <p id="ffrate">FF Rate: </p>
                </div>
            </div>
            <div class="tool">
                <h2 class="tooltitle">Player compare</h2>
            </div>
        </div>
    </body>
</html>
