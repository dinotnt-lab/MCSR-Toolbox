<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Ranked Toolbox</title>
        <link rel="stylesheet" href="styles.css">
        <script src="app.js" defer></script>
    </head>
    <body>
        <div id="settings-container">
            <button id="settingsButton" aria-haspopup="true" aria-expanded="false" title="Settings">⚙️</button>
            <div id="settingsMenu" class="settings-menu hidden" role="menu" aria-label="Settings menu">
                <div class="settings-item" id="timeformat">
                    <label for="toggleTimeFormat">Time format:</label>
                    <button id="toggleTimeFormat" onclick="toggleTimeFormat()" class="menu-button">Short</button>
                </div>
                <div class="settings-item" id="seasonselector">
                    <label for="seasonInput">Season:</label>
                    <input type="number" id="seasonInput" placeholder="Season number..." min="1" max="100" />
                </div>
                <div class="settings-item" id="autoentername">
                    <label for="autoEnterNameCheckbox">Enter player name on load</label>
                    <input type="text" id="autoEnterNameCheckbox" />
                </div>
            </div>
        </div>
        <div id="title">
            <h1 style="margin-top: 20px; margin-bottom: 30px;">MCSR Ranked Toolbox</h1>
            <div>
                <input type="text" id="playerName" placeholder="Enter player name..." />
                <button id="goButton"
                        onclick="go()"
                        style="
                        background-image: url('spyglass.png');
                        width: 40px;
                        height: 40px;
                        background-size: cover;
                        background-repeat: no-repeat;
                        background-color: rgb(2, 7, 49);
                        border: none;
                        transform: translateY(13px);
                        cursor: pointer;
                        ">
                </button>
            </div>
            <p id='status'>-</p>
        </div>
        <div id="toolgrid">
            <div class="tool" style="width: 170px;">
                <div class="tooltitle">
                    <h2>Player info</h2>
                </div>
                <div id="playerStats">
                    <p id="rank" class="playerStat">Elo: </p>
                    <p id="peak" class="playerStat">Peak Elo: </p>
                    <p id="pb" class="playerStat">PB: </p>
                    <p id="avg" class="playerStat">Average: </p>
                    <p id="lstq" class="playerStat">Last Q: </p>
                    <p id="lston" class="playerStat">Last Online: </p>
                    <p id="wdl" class="playerStat">W/D/L: </p>
                    <p id="winrate" class="playerStat">Winrate: </p>
                    <p id="ffrate" class="playerStat">FF Rate: </p>
                </div>
            </div>
            <div class="tool">
                <div class="tooltitle">
                    <h2>Match history</h2>
                </div>
                <div id="matchHistory">
                    <table id="matchTable">
                        <tbody>
                            <tr><td>-</td><td>-</td><td>-</td></tr>
                            <tr><td>-</td><td>-</td><td>-</td></tr>
                            <tr><td>-</td><td>-</td><td>-</td></tr>
                            <tr><td>-</td><td>-</td><td>-</td></tr>
                            <tr><td>-</td><td>-</td><td>-</td></tr>
                            <tr><td>-</td><td>-</td><td>-</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="tool">
                <div class="tooltitle">
                    <h2>Elo Graph</h2>
                </div>
                <div id="eloGraph">
                    <canvas id="eloCanvas" width="400" height="300"></canvas>
                </div>
            </div>
<div class="tool skillcheck">
    <div class="tooltitle">
        <h2>Skills Checklist</h2>
    </div>

    <div class="wrapper">
        <div class="skilltabs">
            <button data-tab="ov">ov</button>
            <button data-tab="nether1">nether 1</button>
            <button data-tab="nether2">nether 2</button>
        </div>
        <div class="skilltabs">
            <button data-tab="blind">blind</button>
            <button data-tab="stronghold">sh</button>
            <button data-tab="end">end</button>
            <button data-tab="misc">misc</button>
        </div>
    </div>

    <div class="spacer"></div>

    <div id="checklistContainer">

        <div class="checklist-tab" data-tab="ov">
            <ul class="checklist">
                <li><label><input type="checkbox" id="ov-0"> craft</label></li>
                <li><label><input type="checkbox" id="ov-1"> chest spawns</label></li>
                <li><label><input type="checkbox" id="ov-2"> mapless (bt)</label></li>
                <li><label><input type="checkbox" id="ov-3"> what to enter with</label></li>
                <li><label><input type="checkbox" id="ov-4"> lava pool portal</label></li>
                <li><label><input type="checkbox" id="ov-5"> l shape magma portal</label></li>
                <li><label><input type="checkbox" id="ov-6"> 2x1 magma portal</label></li>
            </ul>
        </div>

        <div class="checklist-tab" data-tab="nether1">
            <ul class="checklist">
                <li><label><input type="checkbox" id="nether1-0"> e-ray</label></li>
                <li><label><input type="checkbox" id="nether1-1"> bastion identity</label></li>
                <li><label><input type="checkbox" id="nether1-2"> treasure</label></li>
                <li>
                    <label><input type="checkbox" id="nether1-3"> housing</label>
                    <ul>
                        <li><label><input type="checkbox" id="nether1-3-0"> topdown</label></li>
                        <li><label><input type="checkbox" id="nether1-3-1"> manhunt</label></li>
                    </ul>
                </li>
                <li>
                    <label><input type="checkbox" id="nether1-4"> bridge</label>
                    <ul>
                        <li><label><input type="checkbox" id="nether1-4-0"> double triple</label></li>
                        <li><label><input type="checkbox" id="nether1-4-1"> left triple</label></li>
                        <li><label><input type="checkbox" id="nether1-4-2"> right triple</label></li>
                        <li><label><input type="checkbox" id="nether1-4-3"> double single</label></li>
                    </ul>
                </li>
            </ul>
        </div>

        <div class="checklist-tab" data-tab="nether2">
            <ul class="checklist">
                <li><label><input type="checkbox" id="nether2-0"> pieray</label></li>
                <li><label><input type="checkbox" id="nether2-1"> glowdar</label></li>
                <li><label><input type="checkbox" id="nether2-2"> good/bad fort</label></li>
                <li><label><input type="checkbox" id="nether2-3"> blaze bed/tnt</label></li>
                <li>
                    <label><input type="checkbox" id="nether2-4"> how to build portal</label>
                    <ul>
                        <li><label><input type="checkbox" id="nether2-4-0"> efficiently (corners)</label></li>
                        <li><label><input type="checkbox" id="nether2-4-1"> fast</label></li>
                    </ul>
                </li>
            </ul>
        </div>

        <div class="checklist-tab" data-tab="blind">
            <ul class="checklist">
                <li><label><input type="checkbox" id="blind-0"> ninbot</label></li>
                <li><label><input type="checkbox" id="blind-1"> 2 eye calc</label></li>
                <li><label><input type="checkbox" id="blind-2"> boat eye</label></li>
                <li><label><input type="checkbox" id="blind-3"> godsens</label></li>
                <li><label><input type="checkbox" id="blind-4"> 2nd portal y level</label></li>
            </ul>
        </div>

        <div class="checklist-tab" data-tab="stronghold">
            <ul class="checklist">
                <li><label><input type="checkbox" id="stronghold-0"> premetive</label></li>
                <li><label><input type="checkbox" id="stronghold-1"> hiddens</label></li>
                <li><label><input type="checkbox" id="stronghold-2"> silverfish sound</label></li>
            </ul>
        </div>

        <div class="checklist-tab" data-tab="end">
            <ul class="checklist">
                <li><label><input type="checkbox" id="end-0"> one cycle</label></li>
                <li><label><input type="checkbox" id="end-1"> halfbow</label></li>
                <li><label><input type="checkbox" id="end-2"> fullbow</label></li>
                <li>
                    <label><input type="checkbox" id="end-3"> zero cycle</label>
                    <ul>
                        <li><label><input type="checkbox" id="end-3-0"> small boy - y88</label></li>
                        <li><label><input type="checkbox" id="end-3-1"> y88 - y97</label></li>
                        <li><label><input type="checkbox" id="end-3-2"> side setups</label></li>
                        <li><label><input type="checkbox" id="end-3-3"> y97+</label></li>
                    </ul>
                </li>
                <li><label><input type="checkbox" id="end-4"> pearl clip</label></li>
            </ul>
        </div>

        <div class="checklist-tab" data-tab="misc">
            <ul class="checklist">
                <li><label><input type="checkbox" id="misc-0"> boat clutch</label></li>
                <li>
                    <label><input type="checkbox" id="misc-1"> death resets</label>
                    <ul>
                        <li><label><input type="checkbox" id="misc-1-0"> respawn anchor</label></li>
                        <li><label><input type="checkbox" id="misc-1-1"> bed (flat ground)</label></li>
                        <li><label><input type="checkbox" id="misc-1-2"> bed (portal room)</label></li>
                    </ul>
                </li>
                <li>
                    <label><input type="checkbox" id="misc-2"> hotkeys/resizing</label>
                    <ul>
                        <li><label><input type="checkbox" id="misc-2-0"> hotbar</label></li>
                        <li><label><input type="checkbox" id="misc-2-1"> F3</label></li>
                        <li><label><input type="checkbox" id="misc-2-2"> thin</label></li>
                        <li><label><input type="checkbox" id="misc-2-3"> wide</label></li>
                        <li><label><input type="checkbox" id="misc-2-4"> eyezoom</label></li>
                    </ul>
                </li>
            </ul>
        </div>

    </div>
</div>
        </div>
    </body>
</html>
