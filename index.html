<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Ranked Toolbox</title>
        <link rel="stylesheet" href="styles.css">
        <script src="app.js" defer></script>
    </head>
    <body>
        <div id="settings-container">
            <button id="settingsButton" aria-haspopup="true" aria-expanded="false" title="Settings">⚙️</button>
            <div id="settingsMenu" class="settings-menu hidden" role="menu" aria-label="Settings menu">
                <div class="settings-item" id="timeformat">
                    <label for="toggleTimeFormat">Time format:</label>
                    <button id="toggleTimeFormat" onclick="toggleTimeFormat()" class="menu-button">Short</button>
                </div>
                <div class="settings-item" id="seasonselector">
                    <label for="seasonInput">Season:</label>
                    <input type="number" id="seasonInput" placeholder="Season number..." min="1" max="100" />
                </div>
                <div class="settings-item" id="autoentername">
                    <label for="autoEnterNameCheckbox">Enter player name on load</label>
                    <input type="text" id="autoEnterNameCheckbox" />
                </div>
            </div>
        </div>
        <div id="title">
            <h1 style="margin-top: 20px; margin-bottom: 30px;">MCSR Ranked Toolbox</h1>
            <div>
                <input type="text" id="playerName" placeholder="Enter player name..." />
                <button id="goButton"
                        onclick="go()"
                        style="
                        background-image: url('spyglass.png');
                        width: 40px;
                        height: 40px;
                        background-size: cover;
                        background-repeat: no-repeat;
                        background-color: rgb(2, 7, 49);
                        border: none;
                        transform: translateY(13px);
                        cursor: pointer;
                        ">
                </button>
            </div>
            <p id='status'>-</p>
        </div>
        <div id="toolgrid">
            <div class="tool" style="width: 170px;">
                <div class="tooltitle">
                    <h2>Player info</h2>
                </div>
                <div id="playerStats">
                    <p id="rank" class="playerStat">Elo: </p>
                    <p id="peak" class="playerStat">Peak Elo: </p>
                    <p id="pb" class="playerStat">PB: </p>
                    <p id="avg" class="playerStat">Average: </p>
                    <p id="lstq" class="playerStat">Last Q: </p>
                    <p id="lston" class="playerStat">Last Online: </p>
                    <p id="wdl" class="playerStat">W/D/L: </p>
                    <p id="winrate" class="playerStat">Winrate: </p>
                    <p id="ffrate" class="playerStat">FF Rate: </p>
                </div>
            </div>
            <div class="tool">
                <div class="tooltitle">
                    <h2>Match history</h2>
                </div>
                <div id="matchHistory">
                    <table id="matchTable">
                        <tbody>
                            <tr><td>-</td><td>-</td><td>-</td></tr>
                            <tr><td>-</td><td>-</td><td>-</td></tr>
                            <tr><td>-</td><td>-</td><td>-</td></tr>
                            <tr><td>-</td><td>-</td><td>-</td></tr>
                            <tr><td>-</td><td>-</td><td>-</td></tr>
                            <tr><td>-</td><td>-</td><td>-</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="tool">
                <div class="tooltitle">
                    <h2>Elo Graph</h2>
                </div>
                <div id="eloGraph">
                    <canvas id="eloCanvas" width="400" height="300"></canvas>
                </div>
            </div>
            <div class="tool skillcheck">
    <div class="tooltitle">
        <h2>Skills Checklist</h2>
    </div>

    <div id="checklistContainer">
        <ul class="checklist">
            <li><label><input type="checkbox" id="ov-0"> craft</label></li>
            <li><label><input type="checkbox" id="ov-1"> chest spawns</label></li>
            <li><label><input type="checkbox" id="ov-2"> mapless (bt)</label></li>
            <li><label><input type="checkbox" id="ov-3"> what to enter with</label></li>
            <li><label><input type="checkbox" id="ov-4"> lava pool portal</label></li>
            <li><label><input type="checkbox" id="ov-5"> l shape magma portal</label></li>
            <li><label><input type="checkbox" id="ov-6"> 2x1 magma portal</label></li>

            <li><label><input type="checkbox" id="nether1-0"> e-ray</label></li>
            <li><label><input type="checkbox" id="nether1-1"> bastion identity</label></li>
            <li><label><input type="checkbox" id="nether1-2"> treasure</label></li>
            <li>
                <label><input type="checkbox" id="nether1-3"> housing</label>
                <ul>
                    <li><label><input type="checkbox" id="nether1-3-0"> topdown</label></li>
                    <li><label><input type="checkbox" id="nether1-3-1"> manhunt</label></li>
                </ul>
            </li>

            <li><label><input type="checkbox" id="blind-0"> ninbot</label></li>
            <li><label><input type="checkbox" id="blind-1"> 2 eye calc</label></li>
            <li><label><input type="checkbox" id="blind-2"> boat eye</label></li>
            <li><label><input type="checkbox" id="blind-3"> godsens</label></li>
            <li><label><input type="checkbox" id="blind-4"> 2nd portal y level</label></li>

            <li><label><input type="checkbox" id="end-0"> one cycle</label></li>
            <li><label><input type="checkbox" id="end-1"> halfbow</label></li>
            <li><label><input type="checkbox" id="end-2"> fullbow</label></li>
        </ul>
    </div>
</div>
        </div>
    </body>
</html>
